# 真彩色支持（nvim 的 termguicolors 依赖此配置）
#   - default-terminal: tmux 内部 TERM
#   - terminal-features 通配 *:RGB 适配所有外层终端（Ghostty/iTerm2/Alacritty 等），
#     不再依赖外层 TERM 必须叫 xterm-256color
set -g default-terminal "tmux-256color"
set -ag terminal-features "*:RGB"

# 降低 escape-time，避免 nvim 中 <Esc> 有延迟
set -g escape-time 10

# 鼠标支持
set -g mouse on

# pane 分割线颜色（默认色与深色背景接近，竖线几乎看不见）
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour39
