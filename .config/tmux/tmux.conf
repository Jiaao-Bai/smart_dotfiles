# ============================================================
# 真彩色（24-bit RGB）原理说明
# ============================================================
# 背景：现代终端（Ghostty/iTerm2/Alacritty…）都支持 1600 万色 RGB，
# 但老终端只支持 256 色。程序怎么知道当前终端支不支持？看 $TERM。
#
# tmux 是一个"中间层"：
#   外层终端 (Ghostty)  ──►  tmux  ──►  里面的程序 (nvim)
#
# nvim 想画 RGB 颜色时，会发一段 RGB 转义序列给 tmux。tmux 要决定：
#   - 外层终端支持 RGB → 把这段序列原样转发出去，颜色正常
#   - 外层终端不支持   → 自动降级成 256 色，颜色发灰
#
# tmux 判断"外层终端支不支持 RGB"的依据，是启动时 $TERM 的值，
# 加上自己内部的"终端能力表"。
#
# 旧写法的坑：
#   set -ag terminal-overrides ",xterm-256color:RGB"
#   这行意思是"只有当外层 TERM 字面值等于 xterm-256color 时，
#   才补一条 RGB 能力"。Ghostty 的 TERM 是 xterm-ghostty，不匹配，
#   tmux 就认为外层不支持 RGB → 把 nvim 的 RGB 序列降级 → 颜色变灰。
#
# 新写法：
#   set -ag terminal-features "*:RGB"
#   * 是通配符，意思是"不管外层 TERM 叫什么，都声明它支持 RGB"。
#   这样 tmux 永远原样转发 RGB 序列，颜色就对了。
#   （前提：你实际用的终端确实支持 RGB；现代主流终端都支持。）
#
# 为什么 macOS 上不改也正常？
# tmux 从 3.5 开始才把 xterm-ghostty 加进内置终端识别表，会自动
# 启用 RGB。macOS Homebrew 是 3.6a，已收录；容器里 apt 装的是
# 3.4，还没收录，所以必须手动声明。
# ============================================================

# 真彩色支持（nvim 的 termguicolors 依赖此配置）
set -g default-terminal "tmux-256color"
set -ag terminal-features "*:RGB"

# 降低 escape-time，避免 nvim 中 <Esc> 有延迟
set -g escape-time 10

# 鼠标支持
set -g mouse on
